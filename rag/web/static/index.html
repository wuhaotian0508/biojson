<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nutriMaster - 基因问答系统</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- Markdown 渲染（本地托管，避免 CDN 阻塞） -->
    <script src="/static/marked.min.js"></script>
    <!-- ===== Supabase JS SDK（本地托管） ===== -->
    <script src="/static/supabase.min.js"></script>
</head>
<body>
    <!-- ===== 登录/注册覆盖层（新增）===== -->
    <div id="auth-overlay" class="auth-overlay" style="display: flex;">
        <div class="auth-split">
            <!-- 左侧：欢迎/品牌 -->
            <div class="auth-welcome">
                <div class="auth-welcome-inner">
                    <div class="auth-logo auth-logo-large">
                        <img class="auth-logo-icon" src="/static/logo-icon.png" alt="NutriMaster icon">
                        <span class="auth-logo-text"><span class="logo-nutri">Nutri</span><span class="logo-master">Master</span></span>
                    </div>
                    <p class="auth-tagline" data-i18n="auth.tagline">智能植物营养基因问答平台</p>
                    <ul class="auth-features">
                        <li data-i18n="auth.feature1">基因数据库语义检索</li>
                        <li data-i18n="auth.feature2">PubMed 文献联网搜索</li>
                        <li data-i18n="auth.feature3">个人知识库管理</li>
                        <li data-i18n="auth.feature4">AI 深度搜索报告</li>
                    </ul>
                </div>
            </div>
            <!-- 右侧：表单 -->
            <div class="auth-form-side">
                <div class="auth-card">
                    <div class="auth-tabs">
                        <button id="tab-login" class="auth-tab active" data-i18n="auth.login">登录</button>
                        <button id="tab-signup" class="auth-tab" data-i18n="auth.signup">注册</button>
                    </div>

                    <!-- 错误提示 -->
                    <div id="auth-error" class="auth-error" style="display: none;"></div>

                    <!-- 登录表单 -->
                    <form id="login-form" class="auth-form">
                        <input type="email" id="login-email" data-i18n-placeholder="auth.emailPlaceholder" placeholder="邮箱地址" required autocomplete="email">
                        <input type="password" id="login-password" data-i18n-placeholder="auth.passwordPlaceholder" placeholder="密码" required autocomplete="current-password">
                        <button type="submit" id="login-submit-btn" class="auth-submit-btn" data-i18n="auth.loginBtn">登 录</button>
                    </form>

                    <!-- 注册表单（默认隐藏） -->
                    <form id="signup-form" class="auth-form" style="display: none;">
                        <input type="email" id="signup-email" data-i18n-placeholder="auth.emailPlaceholder" placeholder="邮箱地址" required autocomplete="email">
                        <input type="password" id="signup-password" data-i18n-placeholder="auth.signupPasswordPlaceholder" placeholder="密码（至少6位）" required autocomplete="new-password">
                        <input type="password" id="signup-confirm-password" data-i18n-placeholder="auth.confirmPasswordPlaceholder" placeholder="确认密码" required autocomplete="new-password">
                        <input type="text" id="signup-nickname" data-i18n-placeholder="auth.nicknamePlaceholder" placeholder="昵称（选填）" autocomplete="nickname" maxlength="30">
                        <div class="avatar-picker" id="avatar-picker">
                            <div class="avatar-preview" id="avatar-preview">
                                <span class="avatar-preview-placeholder" data-i18n="auth.avatarPlaceholder">头像</span>
                            </div>
                            <label class="avatar-upload-label" for="avatar-file-input" data-i18n="auth.chooseAvatar">选择头像</label>
                            <input type="file" id="avatar-file-input" accept="image/*" style="display:none;">
                        </div>
                        <button type="submit" id="signup-submit-btn" class="auth-submit-btn" data-i18n="auth.signupBtn">注 册</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="logo-section">
                <div class="logo">
                    <img class="logo-icon" src="/static/logo-icon.png" alt="NutriMaster icon">
                    <span class="logo-text"><span class="logo-nutri">Nutri</span><span class="logo-master">Master</span></span>
                </div>
            </div>

            <div class="history-section">
                <h3 data-i18n="sidebar.history">历史会话</h3>
                <div id="history-list">
                    <div class="history-loading" data-i18n="sidebar.viewAll">查看全部...</div>
                </div>
            </div>

            <!-- 底部知识库入口 -->
            <div class="knowledge-base" id="kb-toggle">
                <div class="kb-icon">📚</div>
                <span data-i18n="sidebar.myLibrary">我的知识库</span>
                <span class="kb-badge" id="kb-file-count" style="display:none;">0</span>
            </div>
        </div>

        <!-- ===== 知识库模态窗口 ===== -->
        <div class="kb-modal-overlay" id="kb-modal-overlay" style="display:none;">
            <div class="kb-modal">
                <div class="kb-modal-header">
                    <h3 data-i18n="kb.title">我的知识库</h3>
                    <button class="kb-modal-close" id="kb-modal-close">✕</button>
                </div>
                <div class="kb-modal-body">
                    <div class="kb-upload-area">
                        <button class="kb-upload-btn" id="kb-upload-btn" data-i18n="kb.uploadBtn">+ 上传 PDF</button>
                        <input type="file" id="kb-file-input" accept=".pdf" style="display:none;">
                        <div class="kb-upload-progress" id="kb-upload-progress" style="display:none;">
                            <div class="kb-upload-progress-bar" id="kb-upload-progress-bar"></div>
                            <span class="kb-upload-status" id="kb-upload-status" data-i18n="kb.uploading">上传中...</span>
                        </div>
                    </div>
                    <div class="kb-file-list" id="kb-file-list">
                        <div class="kb-empty" data-i18n="kb.empty">暂无文件，点击上方按钮上传 PDF</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 头部 -->
            <div class="header">
                <div class="header-left">
                    <button class="menu-btn">☰</button>
                    <button class="new-chat-btn" id="new-chat-btn" data-i18n="header.newChat">+ 新对话</button>
                </div>
                <div class="header-right">
                    <button class="lang-btn" id="lang-btn">简体中文</button>
                    <button class="admin-btn" id="admin-btn" style="display:none;" data-i18n="header.admin">管理后台</button>
                    <div class="user-area" id="user-area">
                        <div class="user-avatar" id="user-avatar">👤</div>
                        <span class="user-nickname" id="user-nickname"></span>
                    </div>
                </div>
            </div>

            <!-- 内容包装器 -->
            <div class="content-wrapper">
                <!-- 欢迎标语区域 (初始显示) -->
                <div id="welcome-section" class="welcome-section">
                    <h1 id="welcome-slogan" class="welcome-slogan">今天你想知道点什么？</h1>
                </div>

                <!-- 聊天区域 -->
                <div id="chat-container" class="chat-container"></div>

                <!-- 输入区域 -->
                <div class="input-section">
                    <div class="input-container">
                        <textarea
                            id="query-input"
                            data-i18n-placeholder="input.placeholder"
                            placeholder=""
                            rows="1"
                        ></textarea>
                        <div class="input-actions">
                            <button class="action-btn" id="personal-btn" data-i18n="input.personal">个人库</button>
                            <button class="action-btn" id="depth-btn" data-i18n="input.depth">深度搜索</button>
                            <button class="send-btn" id="send-btn">➤</button>
                        </div>
                    </div>
                </div>

                <!-- 场景介绍 (底部) -->
                <div id="scene-intro" class="scene-intro">
                        <div class="scene-cards">
                            <article class="scene-card scene-card-retrieval">
                                <div class="scene-card-icon" aria-hidden="true">
                                    <svg viewBox="0 0 24 24" fill="none">
                                        <path d="M7 4.75H14.5L18 8.25V18.25C18 19.2165 17.2165 20 16.25 20H7.75C6.7835 20 6 19.2165 6 18.25V6.5C6 5.5335 6.7835 4.75 7.75 4.75H7Z" />
                                        <path d="M14 4.75V8.25H17.5" />
                                        <path d="M8.75 11H15.25" />
                                        <path d="M8.75 14H15.25" />
                                        <path d="M8.75 17H12.5" />
                                    </svg>
                                </div>
                                <div class="scene-card-body">
                                    <h3 class="scene-card-title" data-i18n="scene.retrieval.title">检索增强</h3>
                                    <p class="scene-card-desc" data-i18n="scene.retrieval.desc">每一个回答基于真实文献信息，夯实营养代谢科研知识根基。</p>
                                </div>
                            </article>

                            <article class="scene-card scene-card-deep">
                                <div class="scene-card-icon" aria-hidden="true">
                                    <svg viewBox="0 0 24 24" fill="none">
                                        <circle cx="7" cy="8" r="2.25" />
                                        <circle cx="16.5" cy="6.75" r="2" />
                                        <circle cx="17" cy="15.5" r="2.5" />
                                        <circle cx="8.5" cy="17" r="1.75" />
                                        <path d="M8.8 8.5L14.3 7.2" />
                                        <path d="M8.4 9.5L15.3 14.1" />
                                        <path d="M9.4 16.2L15 15.7" />
                                    </svg>
                                </div>
                                <div class="scene-card-body">
                                    <h3 class="scene-card-title" data-i18n="scene.deep.title">深度搜索</h3>
                                    <p class="scene-card-desc" data-i18n="scene.deep.desc">营养代谢产物合成途径与调控网络深度分析，探索营养合成的更多可能性。</p>
                                </div>
                            </article>

                            <article class="scene-card scene-card-library">
                                <div class="scene-card-icon" aria-hidden="true">
                                    <svg viewBox="0 0 24 24" fill="none">
                                        <path d="M4.75 8.25C4.75 7.2835 5.5335 6.5 6.5 6.5H10L11.5 8H17.5C18.4665 8 19.25 8.7835 19.25 9.75V17.5C19.25 18.4665 18.4665 19.25 17.5 19.25H6.5C5.5335 19.25 4.75 18.4665 4.75 17.5V8.25Z" />
                                        <path d="M8 11.25H16" />
                                        <path d="M8 14.25H13.5" />
                                    </svg>
                                </div>
                                <div class="scene-card-body">
                                    <h3 class="scene-card-title" data-i18n="scene.library.title">个人知识库</h3>
                                    <p class="scene-card-desc" data-i18n="scene.library.desc">支持个人文献上传功能，打造符合个人需求的定制化知识库。</p>
                                </div>
                            </article>
                        </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== 认证模块（新增，必须在 app.js 之前加载） ===== -->
    <script src="/static/auth.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
