title = "gitleaks config - biojson project"

# Ignore biological data: gene accession numbers and DNA/RNA sequences

[allowlist]
  description = "Biological data patterns (gene accessions, DNA/RNA sequences)"

  # Gene accession number patterns (LOC_Os, TraesCS, Vradi, scaffold, XM_, etc.)
  regexes = [
    '''Accession_Number["']?\s*[:=]\s*["']?[A-Za-z0-9_.;/\s-]+''',
    '''(?i)(LOC_Os|TraesCS|Vradi|Ghicr|Peaxi|Pp3c|scaffold|HORVU|GRMZM|Sobic|Solyc|AT[0-9]G|XM_|XP_|NM_|NP_)[A-Za-z0-9_.]+''',
  ]

  # Ignore biological data directories entirely
  paths = [
    '''extractor/reports/.*''',
    '''extractor/input/.*''',
    '''rag/data/.*\.json''',
    '''.*_nutri_plant.*\.json''',
  ]
