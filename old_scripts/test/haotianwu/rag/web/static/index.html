<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>基因信息 RAG 问答系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🧬 基因信息 RAG 问答系统</h1>
            <p class="subtitle">基于文献检索的智能问答</p>
        </header>

        <div id="chat-container" class="chat-container">
            <!-- 消息动态插入 -->
        </div>

        <div class="input-area">
            <textarea id="question-input" placeholder="请输入您的问题，例如：植物中DREB转录因子如何调控抗旱性？" rows="2"></textarea>
            <button id="send-btn" class="primary">发送</button>
        </div>

        <div class="actions">
            <button id="clear-btn">清空对话</button>
            <button id="export-btn">导出全部</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
