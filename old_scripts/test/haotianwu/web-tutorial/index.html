<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web 原理演示 - 论文列表</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 页面结构：就像房子的框架 -->
    <div class="container">

        <!-- 头部：显示标题和登录状态 -->
        <header class="header">
            <h1>📄 论文列表</h1>
            <div id="loginSection">
                <input type="text" id="usernameInput" placeholder="输入你的名字">
                <button onclick="login()">登录</button>
            </div>
            <div id="userInfo" style="display: none;">
                <span>用户: <strong id="currentUser"></strong></span>
                <button onclick="logout()">退出</button>
            </div>
        </header>

        <!-- 状态消息 -->
        <div id="message" class="message"></div>

        <!-- 主内容区：显示论文列表 -->
        <main class="main">
            <!-- 加载中提示 -->
            <div id="loading" class="loading">⏳ 正在从 Supabase 加载数据...</div>

            <!-- 论文列表容器 -->
            <div id="papersList" class="papers-list"></div>

            <!-- 空数据提示 -->
            <div id="emptyState" class="empty-state" style="display: none;">
                <p>📭 暂无论文数据</p>
                <p class="hint">请先运行数据导入脚本</p>
            </div>
        </main>

        <!-- 详情面板：点击论文后显示 -->
        <aside id="detailPanel" class="detail-panel hidden">
            <div class="panel-header">
                <h2>论文详情</h2>
                <button onclick="closeDetail()" class="close-btn">✕</button>
            </div>
            <div id="detailContent"></div>
        </aside>
    </div>

    <!-- 引入 JavaScript 库：Supabase 客户端 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- 引入我们自己的代码 -->
    <script src="supabase-client.js"></script>
    <script src="app.js"></script>
</body>
</html>
